<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="st.css">
    <title>Document</title>
</head>
<body>
    <div class="content" id="content">
        <div id="map"></div>
    </div>
    <div id="bar">
        <div id="main">
            <h3>Map Game</h3>
            <p id="secondary_title">can you identify all countries in the world? </p>
            <div id="timer-display" style="font-size: 24px; color: red; margin-top: 10px;">00:00</div>
        </div>
        <div id="mode_select" class="barpage">
            <select name="mode" id="mode">
                <option value="click">click on a country</option>
                <!-- <option value="typ">typing the name of highligh country</option> -->
            </select>
            <select name="timer" id="timer">
                <option value="0">no timer</option>
                <!-- <option value="1">timer open</option> -->
            </select>
            <input type="number" name="timer_setting" id="timer_setting" placeholder="minute" max="5" min="1" value="1">
            <select name="question_count" id="question_count">
                <option value="5">5</option>
                <option value="7">7</option>
                <option value="11">11</option>
                <option value="17">17</option>
                <option value="22">22</option>
            </select>
            <button id="start_game">Play</button>
        </div>
        <div id="click" class="barpage">
            <p>click on <strong id="click_text"></strong></p>
        </div>
        <div id="typ" class="barpage">
            <h1>enter</h1>
        </div>
    </div>

    <div class="info" id="notice">
        <div class="info__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" viewBox="0 0 24 24" height="24" fill="none"><path fill="#393a37" d="m12 1.5c-5.79844 0-10.5 4.70156-10.5 10.5 0 5.7984 4.70156 10.5 10.5 10.5 5.7984 0 10.5-4.7016 10.5-10.5 0-5.79844-4.7016-10.5-10.5-10.5zm.75 15.5625c0 .1031-.0844.1875-.1875.1875h-1.125c-.1031 0-.1875-.0844-.1875-.1875v-6.375c0-.1031.0844-.1875.1875-.1875h1.125c.1031 0 .1875.0844.1875.1875zm-.75-8.0625c-.2944-.00601-.5747-.12718-.7808-.3375-.206-.21032-.3215-.49305-.3215-.7875s.1155-.57718.3215-.7875c.2061-.21032.4864-.33149.7808-.3375.2944.00601.5747.12718.7808.3375.206.21032.3215.49305.3215.7875s-.1155.57718-.3215.7875c-.2061.21032-.4864.33149-.7808.3375z"></path></svg>
        </div>
        <div class="info__title" id="noticetext">lorem</div>
        <!-- <div class="info__close" id="close_notice"><svg height="20" viewBox="0 0 20 20" width="20" xmlns="http://www.w3.org/2000/svg"><path d="m15.8333 5.34166-1.175-1.175-4.6583 4.65834-4.65833-4.65834-1.175 1.175 4.65833 4.65834-4.65833 4.6583 1.175 1.175 4.65833-4.6583 4.6583 4.6583 1.175-1.175-4.6583-4.6583z" fill="#393a37"></path></svg></div> -->
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
